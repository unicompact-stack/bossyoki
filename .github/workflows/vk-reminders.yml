name: VK Reminders

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send task reminders
        env:
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
          VK_USER_ID: ${{ secrets.VK_USER_ID }}
        run: |
          if [ ! -f tasks.json ]; then
            RANDOM_ID=$((RANDOM * RANDOM % 2147483647))
            curl -s -X POST "https://api.vk.com/method/messages.send" \
              -d "user_id=$VK_USER_ID" \
              --data-urlencode "message=📋 Проверь задачи на сайте!" \
              -d "access_token=$VK_TOKEN" \
              -d "random_id=$RANDOM_ID" \
              -d "v=5.199"
            exit 0
          fi

          python3 << 'EOF'
          import json, os, random
          from datetime import datetime, timedelta
          import urllib.request, urllib.parse

          VK_TOKEN = os.environ['VK_TOKEN']
          VK_USER_ID = os.environ['VK_USER_ID']

          try:
              with open('tasks.json', 'r') as f:
                  tasks = json.load(f)
          except:
              tasks = []

          now = datetime.now()
          today = now.strftime('%Y-%m-%d')
          tomorrow = (now + timedelta(days=1)).strftime('%Y-%m-%d')
          current_time = now.strftime('%H:%M')
          
          active = [t for t in tasks if t.get('status') == 'active' or not t.get('status')]
          messages = []
          
          for task in active:
              title = task.get('text', task.get('title', 'Задача'))
              deadline = task.get('deadline', task.get('date', ''))
              task_time = task.get('time', '')
              
              if deadline and deadline < today:
                  messages.append(f"⚠️ ПРОСРОЧЕНО: {title}")
              elif deadline == today and task_time:
                  try:
                      task_h, task_m = map(int, task_time.split(':'))
                      now_h, now_m = map(int, current_time.split(':'))
                      task_minutes = task_h * 60 + task_m
                      now_minutes = now_h * 60 + now_m
                      if task_minutes - 5 <= now_minutes <= task_minutes + 5:
                          messages.append(f"⏰ СЕЙЧАС: {title} в {task_time}")
                  except:
                      pass
              elif deadline == today and not task_time:
                  messages.append(f"📋 СЕГОДНЯ: {title}")
              elif deadline == tomorrow:
                  time_str = f" в {task_time}" if task_time else ""
                  messages.append(f"📅 ЗАВТРА: {title}{time_str}")
          
          if not messages and active:
              messages.append(f"📊 У тебя {len(active)} активных задач!")
          elif not messages:
              messages.append("🎉 Нет активных задач. Отдыхай!")
          
          motivation = ["💪 Ты справляешься!", "🔥 Продолжай!", "⭐ Ты на правильном пути!"]
          messages.append(random.choice(motivation))
          
          final_message = "\n".join(messages)
          import time
          random_id = int(time.time() * 1000) % 2147483647
          data = urllib.parse.urlencode({
              'user_id': VK_USER_ID, 'message': final_message,
              'access_token': VK_TOKEN, 'v': '5.199',
              'random_id': random_id
          }).encode()
          req = urllib.request.Request('https://api.vk.com/method/messages.send', data=data)
          urllib.request.urlopen(req)
          print(f"Отправлено: {final_message}")
          EOF
